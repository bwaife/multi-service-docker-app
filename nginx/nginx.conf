worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Reason; structured access logs; can be shipped later; stdout/stderr captured by Docker.
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  sendfile on;
  keepalive_timeout 65;

  upstream api_upstream {
    server api:3000;
  }

  upstream web_upstream {
    server web:80;
  }

  server {
    listen 80;

    # Reason; explicit health endpoint for proxy; used by healthcheck.
    location /healthz {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # Reason; single public origin; avoids CORS; browser calls same host.
    location /api/ {
      proxy_pass http://api_upstream/;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Reason; sensible timeouts; prevents hung connections tying resources.
      proxy_connect_timeout 5s;
      proxy_read_timeout 30s;
      proxy_send_timeout 30s;
    }

    # Everything else goes to web
    location / {
      proxy_pass http://web_upstream/;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}