name: multi-service-app

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: edge-nginx
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "8080:3000"
    environment:
      PORT: "3000"

      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGO_DB: appdb

      REDIS_HOST: redis
      REDIS_PORT: "6379"

      # Secrets are mounted as files; app reads these paths and loads the values.
      MONGO_USER_FILE: /run/secrets/mongo_root_username
      MONGO_PASS_FILE: /run/secrets/mongo_root_password
      REDIS_PASS_FILE: /run/secrets/redis_password
    secrets:
      - mongo_root_username
      - mongo_root_password
      - redis_password
    networks:
      - appnet
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mongo:
    image: mongo:7
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME_FILE: /run/secrets/mongo_root_username
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password
    secrets:
      - mongo_root_username
      - mongo_root_password
    volumes:
      - mongo_data:/data/db
    networks:
      - appnet
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })' >/dev/null 2>&1 || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: redis
    command:
      [
        "sh",
        "-c",
        "redis-server --appendonly yes --requirepass \"$$(cat /run/secrets/redis_password)\""
      ]
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    networks:
      - appnet
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$$(cat /run/secrets/redis_password)\" ping | grep -q PONG"
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  appnet:
    driver: bridge

volumes:
  mongo_data:
  redis_data:

secrets:
  mongo_root_username:
    file: ./secrets/mongo_root_username.txt
  mongo_root_password:
    file: ./secrets/mongo_root_password.txt
  redis_password:
    file: ./secrets/redis_password.txt